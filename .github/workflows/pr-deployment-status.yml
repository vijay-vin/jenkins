name: Post Deployment Status Link

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Without this, GitHub may reject the commit status POST!
permissions:
  statuses: write        # allow posting commit statuses
  contents: read       

jobs:
  post-status:
    runs-on: ubuntu-latest

    steps:
      - name: Build Jenkins Deployment URL
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Jenkins job users will click to open "Build with Parameters"

          JOB_NAME="ai-services/job/pr-preview-pipeline"
          JENKINS_URL="https://sys-powercloud-team-jenkins.swg-devops.com"

          # Default ApplicationList value
          DEFAULT_APP="rag-dev"

          # Add encoding
          ENCODED_PR=$(printf %s "$PR_NUMBER" | jq -sRr @uri)
          ENCODED_APP=$(printf %s "$DEFAULT_APP" | jq -sRr @uri)
   
          # Construct Jenkins Build-with-Parameters URL
          # updateGitStatus=true allows downstream Jenkins pipeline to post/update GitHub status
          # VVVV DEPLOY_URL="${JENKINS_URL}/job/${JOB_NAME}/parambuild/?CHECKOUT=${ENCODED_PR}&ApplicationList=${ENCODED_APP}&updateGitStatus=true"
          DEPLOY_URL="${JENKINS_URL}/job/${JOB_NAME}/parambuild/?CHECKOUT=${ENCODED_PR}&DEPLOY_APP=${ENCODED_APP}"

          echo "DEPLOY_URL=${DEPLOY_URL}" >> $GITHUB_ENV
          echo "Generated Deployment URL: ${DEPLOY_URL}"


      - name: Create GitHub Check Run (Jenkins Link)
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          echo "Creating Check Run..."

          curl -sS -X POST \
                   -H "Authorization: Bearer ${GH_TOKEN}" \
                   -H "Accept: application/vnd.github+json" \
                   https://api.github.com/repos/${REPO}/check-runs \
                   -d @- <<EOF
                   {
                     "name": "Manual Deployment",
                     "head_sha": "${COMMIT_SHA}",
                     "status": "completed",
                     "conclusion": "neutral",
                     "details_url": "${DEPLOY_URL}",
                     "output": {
                        "title": "Manual Deployment Required",
                        "summary": "Click to open Jenkins → Build with Parameters"
                     }
                   }
                   EOF

          echo "Check Run created successfully."

